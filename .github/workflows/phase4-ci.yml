name: Phase 4 CI

on:
  push:
    branches: [main, phase-4]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Contracts ────────────────────────────────────────────────────────────
  contracts:
    name: Contracts validate + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @scientificstate/contracts run validate
      - run: pnpm --filter @scientificstate/contracts run build

  # ── Framework (3 platforms) ──────────────────────────────────────────────
  framework:
    name: Framework (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/framework && uv sync --extra dev
      - run: cd Core/framework && uv run pytest -q
      - run: cd Core/framework && uv run ruff check .

  # ── Daemon (2 platforms) ─────────────────────────────────────────────────
  daemon:
    name: Daemon (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync
      - run: cd Core/daemon && uv run pytest tests/ -q
      - run: cd Core/daemon && uv run ruff check .

  # ── Polymer domain ──────────────────────────────────────────────────────
  polymer:
    name: Polymer domain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Domains/polymer && uv sync --extra dev
      - run: cd Domains/polymer && uv run pytest -q
      - run: cd Domains/polymer && uv run ruff check .

  # ── Desktop typecheck + build ───────────────────────────────────────────
  desktop-typecheck:
    name: Desktop typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Desktop/package-lock.json
      - run: cd Desktop && npm ci
      - run: cd Desktop && npm run typecheck
      - run: cd Desktop && npm run build

  # ── Desktop package (macOS + Windows — main only) ───────────────────────
  desktop-package:
    name: Desktop package (${{ matrix.target }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [desktop-typecheck]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: cd Desktop && npm ci
      - run: cd Desktop && npm run tauri build -- --target ${{ matrix.target }}

  # ── Web build — MOVED to platform-private CI ──────────────────────────
  # Web/ is managed in scientificstate/platform-private

  # ── Security audit ─────────────────────────────────────────────────────
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    continue-on-error: true  # Shows ⚠️ in GitHub UI but doesn't block merge
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Python dependency audit
        run: cd Core/framework && uv sync --extra dev && uv run pip-audit
      - name: JavaScript dependency audit
        run: pnpm audit --audit-level=high

  # ── Table alignment + monitoring tests ─────────────────────────────────
  table-alignment-test:
    name: Table alignment + monitoring
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync
      - run: cd Core/daemon && uv run pytest tests/ -q -k "run or ssv or claim or monitoring or export"

  # ── Nuitka daemon binary (main only) ────────────────────────────────────
  nuitka:
    name: Nuitka daemon build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install nuitka ordered-set
      - run: bash scripts/build-nuitka.sh
