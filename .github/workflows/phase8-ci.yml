name: Phase 8 CI — Enterprise Scale + Compliance

on:
  push:
    branches: [main, "phase-8/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Contracts ────────────────────────────────────────────────────────────
  contracts:
    name: Contracts validate + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @scientificstate/contracts run validate
      - run: pnpm --filter @scientificstate/contracts run build

  # ── Framework ────────────────────────────────────────────────────────────
  framework:
    name: Framework
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/framework && uv sync --extra dev
      - run: cd Core/framework && uv run pytest -q
      - run: cd Core/framework && uv run ruff check .

  # ── Daemon ───────────────────────────────────────────────────────────────
  daemon:
    name: Daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync
      - run: cd Core/daemon && uv run pytest tests/ -q
      - run: cd Core/daemon && uv run ruff check .

  # ── Quantum simulator ───────────────────────────────────────────────────
  quantum-sim:
    continue-on-error: true
    name: Quantum simulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync --extra quantum
      - run: cd Core/daemon && uv run pytest tests/test_quantum_sim_backend.py -q

  # ── Quantum hardware ────────────────────────────────────────────────────
  quantum-hw:
    continue-on-error: true
    name: Quantum hardware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync --extra quantum
      - run: cd Core/daemon && uv run pytest tests/test_quantum_hw_backend.py tests/test_qpu_resilience.py -q

  # ── Hybrid backend ─────────────────────────────────────────────────────
  hybrid:
    continue-on-error: true
    name: Hybrid backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync --extra quantum
      - run: cd Core/daemon && uv run pytest tests/test_hybrid_backend.py -q

  # ── Cost gate ──────────────────────────────────────────────────────────
  cost-gate:
    name: Cost gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync
      - run: cd Core/daemon && uv run pytest tests/test_cost_gate.py -q

  # ── Replication DB ─────────────────────────────────────────────────────
  replication-db:
    name: Replication DB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/framework && uv sync --extra dev && uv run pytest tests/test_replication_db.py -q
      - run: cd Core/daemon && uv sync && uv run pytest tests/test_replication_routes.py -q

  # ── Federation governance ──────────────────────────────────────────────
  federation-governance:
    name: Federation governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync
      - run: cd Core/daemon && uv run pytest tests/test_federation_governance.py -q

  # ── Domains ─────────────────────────────────────────────────────────────
  domains:
    name: "Domain: ${{ matrix.domain }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        domain: [polymer, materials, biology, chemistry]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Domains/${{ matrix.domain }} && uv sync --extra dev
      - run: cd Domains/${{ matrix.domain }} && uv run pytest -q

  # ── Web build — MOVED to private repo CI (scientificstate/platform-private)
  # Web/ is not part of the public repository.

  # ── Desktop typecheck + build ───────────────────────────────────────────
  desktop:
    name: Desktop typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Desktop/package-lock.json
      - run: cd Desktop && npm ci
      - run: cd Desktop && npm run typecheck
      - run: cd Desktop && npm run build

  # ── Shared UI ───────────────────────────────────────────────────────────
  shared-ui:
    name: Shared UI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd Core/ui && npm install && npm run build

  # ── Mobile — MOVED to platform-private CI ─────────────────────────────
  # Mobile/ is managed in scientificstate/platform-private

  # ── i18n ────────────────────────────────────────────────────────────────
  i18n:
    name: i18n key check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-i18n-keys.js

  # ── Plugin SDK ──────────────────────────────────────────────────────────
  plugin-sdk:
    name: Plugin SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd packages/create-ss-domain && npm install && npm test

  # ── Federation ──────────────────────────────────────────────────────────
  federation:
    name: Federation sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync
      - run: cd Core/daemon && uv run pytest tests/test_federation_sync.py -q

  # ── Audit ───────────────────────────────────────────────────────────────
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync
      - run: cd Core/daemon && uv run pytest tests/test_audit.py -q

  # ── Performance benchmark ──────────────────────────────────────────────
  performance-benchmark:
    name: Performance benchmark
    runs-on: ubuntu-latest
    needs: [daemon]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync
      - run: cd Core/daemon && uv run pytest tests/test_performance_benchmark.py -q

  # ── Integration Phase 8 ────────────────────────────────────────────────
  integration-phase8:
    name: Integration Phase 8
    runs-on: ubuntu-latest
    needs: [framework, daemon, quantum-hw, hybrid, replication-db, cost-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync
      - run: cd Core/daemon && uv run pytest tests/test_integration_phase8.py -q

  # ── macOS build ─────────────────────────────────────────────────────────
  build-macos:
    name: Desktop build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Desktop/package-lock.json
      - run: cd Desktop && npm ci
      - run: cd Desktop && npm run build

  # ── Platform smoke ─────────────────────────────────────────────────────
  platform-smoke:
    name: Platform smoke
    runs-on: ubuntu-latest
    needs: [contracts, framework, daemon]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd Core/daemon && uv sync
      - run: cd Core/daemon && uv run pytest tests/test_platform_smoke.py -q
