# Constitutional Gates CI
# =======================
#
# This workflow enforces the 9 Constitutional Principles on every PR.
# ALL gates must pass before merge is allowed.
#
# Gates:
# 1. Determinism - same content = same state_id
# 2. Immutability - no update/delete on SSV/raw
# 3. Signatures - signed edges verify, tampered fail
# 4. Redaction - visibility doesn't change state_id
# 5. Evidence Policy - evidence required for certain edges
# 6. Governance - quarantine rules enforced

name: Constitutional Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  constitutional-gates:
    name: Constitutional Gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scientificstate
          POSTGRES_PASSWORD: scientificstate
          POSTGRES_DB: scientificstate
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run database migrations
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: scientificstate
          POSTGRES_PASSWORD: scientificstate
          POSTGRES_DB: scientificstate
        run: |
          for f in migrations/*.sql; do
            echo "Running migration: $f"
            PGPASSWORD=scientificstate psql -h localhost -U scientificstate -d scientificstate -f "$f"
          done

      - name: Gate 1 - Determinism
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
        run: |
          echo "🔒 Gate 1: Determinism - same content = same state_id"
          pytest tests/constitutional/test_determinism.py -v --tb=short

      - name: Gate 2 - Immutability
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
        run: |
          echo "🔒 Gate 2: Immutability - no update/delete on SSV/raw"
          pytest tests/constitutional/test_immutability.py -v --tb=short

      - name: Gate 3 - Signatures
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
        run: |
          echo "🔒 Gate 3: Signatures - signed edges verify, tampered fail"
          pytest tests/constitutional/test_signatures.py -v --tb=short

      - name: Gate 4 - Redaction
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
        run: |
          echo "🔒 Gate 4: Redaction - visibility doesn't change state_id"
          pytest tests/constitutional/test_redaction.py -v --tb=short

      - name: Gate 5 - Evidence Policy
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
        run: |
          echo "🔒 Gate 5: Evidence Policy - evidence required for certain edges"
          pytest tests/constitutional/test_evidence_policy.py -v --tb=short

      - name: Gate 6 - Governance
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
        run: |
          echo "🔒 Gate 6: Governance - quarantine rules enforced"
          pytest tests/constitutional/test_governance.py -v --tb=short

      - name: Gate 7 - Keypair Safety
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
        run: |
          echo "🔒 Gate 7: Keypair Safety - no server-side key generation in production"
          pytest tests/test_keypair_safety.py -v --tb=short

      - name: All Gates Passed
        run: |
          echo "✅ All Constitutional Gates Passed!"
          echo ""
          echo "This PR complies with all 9 Constitutional Principles."

  federation-test:
    name: Federation Test
    runs-on: ubuntu-latest
    needs: constitutional-gates

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start federation environment
        run: |
          docker-compose -f docker-compose.federation.yml up -d --build
          sleep 30  # Wait for services to be ready

      - name: Check service health
        run: |
          docker-compose -f docker-compose.federation.yml ps
          curl -f http://localhost:8000/api/v1/contracts/edge-types || exit 1
          curl -f http://localhost:8100/api/v1/contracts/edge-types || exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run federation smoke test
        run: |
          pip install requests
          python scripts/federation_smoke.py

      - name: Upload federation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: federation-results
          path: federation_test_results.json

      - name: Cleanup
        if: always()
        run: docker-compose -f docker-compose.federation.yml down -v

  frontend-type-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check || npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint || true
