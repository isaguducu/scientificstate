openapi: "3.1.0"
info:
  title: ScientificState Local Daemon API
  version: "0.1.0"
  description: |
    Local execution daemon API — localhost only.
    The daemon performs scientific computation; it does NOT assert scientific claims.
    All compute outputs require researcher review before claim evaluation.

    Constitutional boundaries:
    - P7: Non-delegation of scientific authority — daemon executes, human evaluates
    - P1: Raw data immutability — daemon never mutates stored data
    - Localhost boundary: No remote daemon access in M1
  contact:
    name: ScientificState
    url: https://scientificstate.org
  license:
    name: Constitutional Science Infrastructure License

servers:
  - url: "http://127.0.0.1:9473"
    description: Local daemon (Execution_Plan_Phase0.md §4.1 — port 9473)

tags:
  - name: health
    description: Daemon health and status
  - name: domains
    description: Domain module discovery and management
  - name: datasets
    description: Dataset ingestion (M1 — local only)
  - name: compute
    description: Scientific compute execution (M1 — classical backend)
  - name: workspaces
    description: Workspace management
  - name: modules
    description: Module trust chain — install, list, revocation (Phase1-B)

paths:
  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Daemon health check
      description: Returns daemon status and loaded domain modules. Used by Desktop to verify daemon is running.
      responses:
        "200":
          description: Daemon is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Daemon is starting or unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /domains:
    get:
      operationId: listDomains
      tags: [domains]
      summary: List loaded domain modules
      description: |
        Returns all domain modules currently registered via DomainRegistry.
        Domain modules are discovered via Python entry_points(group='scientificstate.domains').
      responses:
        "200":
          description: Loaded domains list — plain array (not wrapped)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DomainSummary"

  /domains/{domain_id}:
    get:
      operationId: getDomain
      tags: [domains]
      summary: Get domain module details
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Domain module details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainDetail"
        "404":
          description: Domain not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /datasets/ingest:
    post:
      operationId: ingestDataset
      tags: [datasets]
      summary: Ingest a raw dataset
      description: |
        Ingests raw observational data into the local immutable store.
        Assigned a permanent raw_data_id.
        Constitutional constraint: once stored, data cannot be altered (P1).
        This endpoint only accepts data — it does not perform any analysis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "201":
          description: Dataset ingested successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
        "400":
          description: Invalid request or missing required metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate dataset (same content hash already stored)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspaces]
      summary: List workspaces
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacesResponse"

    post:
      operationId: createWorkspace
      tags: [workspaces]
      summary: Create a new workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceDetail"

  /workspaces/{workspace_id}:
    get:
      operationId: getWorkspace
      tags: [workspaces]
      summary: Get workspace details
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceDetail"
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs:
    post:
      operationId: createRun
      tags: [compute]
      summary: Submit a compute run
      description: |
        Submits a domain compute run for execution. Returns immediately with run_id.
        Constitutional constraint: daemon executes — researcher evaluates (P7).
        Compute output is not a claim — it requires human review before claim creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComputeRunRequest"
      responses:
        "202":
          description: Run accepted — execution is asynchronous
          content:
            application/json:
              schema:
                type: object
                required: [run_id]
                properties:
                  run_id:
                    type: string
                    description: Permanent run identifier — use with GET /runs/{run_id}
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Domain or method not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{run_id}:
    get:
      operationId: getRun
      tags: [compute]
      summary: Get compute run status and result
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run status and result (if completed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputeRunResult"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modules:
    get:
      operationId: listModules
      tags: [modules]
      summary: List installed modules
      description: Returns all domain modules currently installed on this daemon instance.
      responses:
        "200":
          description: Installed module list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleEntry"

  /modules/available:
    get:
      operationId: listAvailableModules
      tags: [modules]
      summary: List modules available in the registry
      description: |
        Returns modules known to the registry (not necessarily installed).
        Used by the Desktop Module Store UI.
      responses:
        "200":
          description: Available module list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleEntry"

  /modules/install:
    post:
      operationId: installModule
      tags: [modules]
      summary: Install a module
      description: |
        Installs a domain module after verifying its manifest signature.
        Constitutional constraint: unsigned modules are ALWAYS rejected (Phase1-B).
        Revoked modules are rejected before installation begins.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleInstallRequest"
      responses:
        "201":
          description: Module installed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleInstallResult"
        "400":
          description: Invalid request, bad manifest, or checksum mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Signature verification failed or module revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Module already installed at this version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modules/{domain_id}:
    get:
      operationId: getModule
      tags: [modules]
      summary: Get installed module details
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Module details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleEntry"
        "404":
          description: Module not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: removeModule
      tags: [modules]
      summary: Remove an installed module
      description: |
        Removes the module code directory.
        Constitutional constraint (P9 — reversibility): SSV, claim, and run
        data are NEVER deleted by module removal. data_preserved is always true.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Module removed (data preserved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleRemoveResult"
        "404":
          description: Module not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modules/search:
    get:
      operationId: searchModules
      tags: [modules]
      summary: Search modules in registry
      description: Search the module registry by keyword or category.
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search query string
        - name: category
          in: query
          schema:
            type: string
          description: Filter by taxonomy field
      responses:
        "200":
          description: Matching modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleEntry"

  /modules/update:
    post:
      operationId: updateModule
      tags: [modules]
      summary: Update an installed module to a newer version
      description: Downloads and verifies the latest version, then replaces the installed module.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain_id]
              properties:
                domain_id:
                  type: string
                target_version:
                  type: string
                  description: Specific version to update to — latest if omitted
      responses:
        "200":
          description: Module updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleInstallResult"
        "400":
          description: Invalid request or downgrade attempted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Module not installed or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modules/check-updates:
    get:
      operationId: checkModuleUpdates
      tags: [modules]
      summary: Check for available updates to installed modules
      responses:
        "200":
          description: List of modules with available updates
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [domain_id, installed_version, latest_version]
                  properties:
                    domain_id:
                      type: string
                    installed_version:
                      type: string
                    latest_version:
                      type: string

  /modules/suggest:
    post:
      operationId: suggestModules
      tags: [modules]
      summary: Auto-detect compatible domain modules for a file
      description: |
        Analyzes a file path and returns matching domain modules based on
        format_signatures in module manifests. Does NOT install anything.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_path]
              properties:
                file_path:
                  type: string
                  description: Absolute local file path to analyze
      responses:
        "200":
          description: Suggested modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleEntry"

  /modules/package:
    post:
      operationId: packageModule
      tags: [modules]
      summary: Package and sign a local domain module
      description: |
        Creates a distributable tarball from a local domain module directory,
        computes checksums, and signs the manifest. Publish is a portal operation — NOT daemon.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_path]
              properties:
                source_path:
                  type: string
                  description: Local directory path containing the domain module
                private_key_path:
                  type: string
                  description: Path to Ed25519 private key for signing
      responses:
        "200":
          description: Module packaged and signed
          content:
            application/json:
              schema:
                type: object
                required: [tarball_path, tarball_hash, manifest_path]
                properties:
                  tarball_path:
                    type: string
                  tarball_hash:
                    type: string
                  manifest_path:
                    type: string
                  signature:
                    type: string
        "400":
          description: Invalid module directory or missing manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modules/revoke:
    post:
      operationId: revokeModule
      tags: [modules]
      summary: Revoke a module version
      description: |
        Marks a module version as revoked. Revoked modules cannot be installed
        or activated. Existing installations are deactivated on next daemon restart.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain_id, version, reason]
              properties:
                domain_id:
                  type: string
                version:
                  type: string
                reason:
                  type: string
                  description: Human-readable revocation reason
      responses:
        "200":
          description: Module revoked
          content:
            application/json:
              schema:
                type: object
                required: [success, domain_id, version]
                properties:
                  success:
                    type: boolean
                  domain_id:
                    type: string
                  version:
                    type: string
        "404":
          description: Module or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, version, uptime_seconds, active_runs, loaded_domains]
      properties:
        status:
          type: string
          enum: [healthy, degraded, starting]
        version:
          type: string
          description: Daemon version string (e.g. "0.1.0")
        uptime_seconds:
          type: number
        active_runs:
          type: integer
          description: Number of currently executing compute runs
        loaded_domains:
          type: array
          items:
            type: string
          description: domain_id list of registered domains

    DomainSummary:
      type: object
      description: |
        Shape matches Execution_Plan_Phase0.md §4.1 and DomainModule.describe() runtime output.
        Plain list — no wrapper. Fields: domain_id, domain_name, version, supported_data_types, method_count.
      required: [domain_id, domain_name, version, supported_data_types, method_count]
      properties:
        domain_id:
          type: string
        domain_name:
          type: string
        version:
          type: string
          pattern: '^\d+\.\d+\.\d+$'
          description: SemVer of the domain module
        supported_data_types:
          type: array
          items:
            type: string
          description: Data types this domain can process (e.g. ["mass_spec_gcms", "dsc_thermal"])
        method_count:
          type: integer

    DomainDetail:
      type: object
      required: [domain_id, domain_name, version, supported_data_types, methods]
      properties:
        domain_id:
          type: string
        domain_name:
          type: string
        version:
          type: string
        supported_data_types:
          type: array
          items:
            type: string
        methods:
          type: array
          items:
            type: object
            required: [method_id, name, produces_uncertainty, produces_validity_scope]
            properties:
              method_id:
                type: string
              name:
                type: string
              produces_uncertainty:
                type: boolean
              produces_validity_scope:
                type: boolean
              compute_class:
                type: string

    IngestRequest:
      type: object
      required: [data_path, acquisition_timestamp, instrument_id, domain_id, sample_id]
      properties:
        data_path:
          type: string
          description: Absolute local file path to raw data
        acquisition_timestamp:
          type: string
          format: date-time
        instrument_id:
          type: string
        domain_id:
          type: string
          description: Which domain this data belongs to
        sample_id:
          type: string
        signal_metadata:
          type: object
          description: Units, dynamic range, additional annotations

    IngestResponse:
      type: object
      required: [raw_data_id, content_hash, stored_at]
      properties:
        raw_data_id:
          type: string
          description: Permanent identifier — never reused, never deleted
        content_hash:
          type: string
          description: SHA-256 content hash for integrity verification
        stored_at:
          type: string
          format: date-time

    WorkspacesResponse:
      type: object
      required: [workspaces]
      properties:
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceSummary"

    WorkspaceSummary:
      type: object
      required: [workspace_id, name, created_at]
      properties:
        workspace_id:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time

    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    WorkspaceDetail:
      type: object
      required: [workspace_id, name, created_at, ssv_count, claim_count]
      properties:
        workspace_id:
          type: string
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        ssv_count:
          type: integer
        claim_count:
          type: integer

    ComputeRunRequest:
      type: object
      required: [workspace_id, domain_id, method_id]
      properties:
        workspace_id:
          type: string
          description: Target workspace identifier
        domain_id:
          type: string
          description: Domain module identifier (e.g. "polymer_science")
        method_id:
          type: string
          description: Method identifier within the domain (e.g. "kmd_analysis")
        dataset_ref:
          type: string
          description: raw_data_id from /datasets/ingest response
        assumptions:
          type: array
          items:
            type: object
          description: "P3: explicit scientific assumptions for this run"
        parameters:
          type: object
          description: Method-specific parameters
        compute_class:
          type: string
          enum: [classical, quantum_sim, quantum_hw, hybrid]
          description: "Optional compute class hint — defaults to classical if omitted"
      additionalProperties: false

    ComputeRunResult:
      type: object
      required: [run_id, workspace_id, domain_id, method_id, status, started_at]
      properties:
        run_id:
          type: string
        workspace_id:
          type: string
        domain_id:
          type: string
        method_id:
          type: string
        status:
          type: string
          enum: [pending, running, succeeded, failed]
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        ssv_ref:
          type: string
          description: SSV id — only when status=succeeded
        result:
          type: object
          description: Domain computation output — only when status=succeeded
        execution_witness:
          type: object
          required: [compute_class, backend_id]
          properties:
            compute_class:
              type: string
              enum: [classical, quantum_sim, quantum_hw, hybrid]
            backend_id:
              type: string
        error:
          type: object
          properties:
            error_code:
              type: string
            message:
              type: string
          description: Error detail — only when status=failed
      additionalProperties: false

    ModuleEntry:
      type: object
      required: [domain_id, version, install_path]
      properties:
        domain_id:
          type: string
        version:
          type: string
          pattern: '^\d+\.\d+\.\d+$'
        install_path:
          type: string
          description: Absolute path to the installed module directory

    ModuleInstallRequest:
      type: object
      required: [manifest_b64, package_b64, public_key_b64]
      properties:
        manifest_b64:
          type: string
          description: Base64-encoded manifest JSON bytes
        package_b64:
          type: string
          description: Base64-encoded module package bytes
        public_key_b64:
          type: string
          description: Base64-encoded DER Ed25519 public key

    ModuleInstallResult:
      type: object
      required: [success, domain_id, version]
      properties:
        success:
          type: boolean
        domain_id:
          type: string
        version:
          type: string
        install_path:
          type: string

    ModuleRemoveResult:
      type: object
      required: [success, domain_id, data_preserved]
      properties:
        success:
          type: boolean
        domain_id:
          type: string
        data_preserved:
          type: boolean
          description: Always true — SSV/claim data is never deleted (P9)

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        detail:
          type: object
