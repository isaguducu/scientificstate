openapi: "3.1.0"
info:
  title: ScientificState Local Daemon API
  version: "0.1.0"
  description: |
    Local execution daemon API — localhost only.
    The daemon performs scientific computation; it does NOT assert scientific claims.
    All compute outputs require researcher review before claim evaluation.

    Constitutional boundaries:
    - P7: Non-delegation of scientific authority — daemon executes, human evaluates
    - P1: Raw data immutability — daemon never mutates stored data
    - Localhost boundary: No remote daemon access in M1
  contact:
    name: ScientificState
    url: https://scientificstate.org
  license:
    name: Constitutional Science Infrastructure License

servers:
  - url: "http://127.0.0.1:9473"
    description: Local daemon (Execution_Plan_Phase0.md §4.1 — port 9473)

tags:
  - name: health
    description: Daemon health and status
  - name: domains
    description: Domain module discovery and management
  - name: datasets
    description: Dataset ingestion (M1 — local only)
  - name: compute
    description: Scientific compute execution (M1 — classical backend)
  - name: workspaces
    description: Workspace management
  - name: modules
    description: Module trust chain — install, list, revocation (Phase1-B)
  - name: export
    description: Standards-compliant scientific data export (Phase3 W3)
  - name: replication
    description: Institutional replication of scientific claims (Phase4 W1 — Main_Source §9A.5 M3-G)
  - name: discovery
    description: Discovery sync — push endorsed claims to portal (Phase5 W2)
  - name: federation
    description: Federation push — distribute endorsed claims to trusted mirrors (Phase7)

paths:
  /discovery/sync:
    post:
      operationId: syncEndorsedClaim
      tags: [discovery]
      summary: Push endorsed claim to portal for global discovery
      description: |
        The daemon does NOT store global discovery data.
        This endpoint validates the payload and forwards it to the portal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndorsedClaimSync"
      responses:
        "200":
          description: Claim accepted for sync
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "accepted" }
                  claim_id: { type: string }
                  message: { type: string }
        "422":
          description: Validation error

  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Daemon health check
      description: Returns daemon status and loaded domain modules. Used by Desktop to verify daemon is running.
      responses:
        "200":
          description: Daemon is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Daemon is starting or unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /domains:
    get:
      operationId: listDomains
      tags: [domains]
      summary: List loaded domain modules
      description: |
        Returns all domain modules currently registered via DomainRegistry.
        Domain modules are discovered via Python entry_points(group='scientificstate.domains').
      responses:
        "200":
          description: Loaded domains list — plain array (not wrapped)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DomainSummary"

  /domains/{domain_id}:
    get:
      operationId: getDomain
      tags: [domains]
      summary: Get domain module details
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Domain module details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainDetail"
        "404":
          description: Domain not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /datasets/ingest:
    post:
      operationId: ingestDataset
      tags: [datasets]
      summary: Ingest a raw dataset
      description: |
        Ingests raw observational data into the local immutable store.
        Assigned a permanent raw_data_id.
        Constitutional constraint: once stored, data cannot be altered (P1).
        This endpoint only accepts data — it does not perform any analysis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "201":
          description: Dataset ingested successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
        "400":
          description: Invalid request or missing required metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate dataset (same content hash already stored)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspaces]
      summary: List workspaces
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspacesResponse"

    post:
      operationId: createWorkspace
      tags: [workspaces]
      summary: Create a new workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceDetail"

  /workspaces/{workspace_id}:
    get:
      operationId: getWorkspace
      tags: [workspaces]
      summary: Get workspace details
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceDetail"
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs:
    post:
      operationId: createRun
      tags: [compute]
      summary: Submit a compute run
      description: |
        Submits a domain compute run for execution. Returns immediately with run_id.
        Constitutional constraint: daemon executes — researcher evaluates (P7).
        Compute output is not a claim — it requires human review before claim creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComputeRunRequest"
      responses:
        "202":
          description: Run accepted — execution is asynchronous
          content:
            application/json:
              schema:
                type: object
                required: [run_id]
                properties:
                  run_id:
                    type: string
                    description: Permanent run identifier — use with GET /runs/{run_id}
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Domain or method not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{run_id}:
    get:
      operationId: getRun
      tags: [compute]
      summary: Get compute run status and result
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run status and result (if completed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComputeRunResult"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modules:
    get:
      operationId: listModules
      tags: [modules]
      summary: List installed modules
      description: Returns all domain modules currently installed on this daemon instance.
      responses:
        "200":
          description: Installed module list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleEntry"

  /modules/available:
    get:
      operationId: listAvailableModules
      tags: [modules]
      summary: List modules available in the registry
      description: |
        Returns modules known to the registry (not necessarily installed).
        Used by the Desktop Module Store UI.
      responses:
        "200":
          description: Available module list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleEntry"

  /modules/install:
    post:
      operationId: installModule
      tags: [modules]
      summary: Install a module
      description: |
        Installs a domain module after verifying its manifest signature.
        Constitutional constraint: unsigned modules are ALWAYS rejected (Phase1-B).
        Revoked modules are rejected before installation begins.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleInstallRequest"
      responses:
        "201":
          description: Module installed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleInstallResult"
        "400":
          description: Invalid request, bad manifest, or checksum mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Signature verification failed or module revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Module already installed at this version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modules/{domain_id}:
    get:
      operationId: getModule
      tags: [modules]
      summary: Get installed module details
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Module details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleEntry"
        "404":
          description: Module not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: removeModule
      tags: [modules]
      summary: Remove an installed module
      description: |
        Removes the module code directory.
        Constitutional constraint (P9 — reversibility): SSV, claim, and run
        data are NEVER deleted by module removal. data_preserved is always true.
      parameters:
        - name: domain_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Module removed (data preserved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleRemoveResult"
        "404":
          description: Module not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modules/search:
    get:
      operationId: searchModules
      tags: [modules]
      summary: Search modules in registry
      description: Search the module registry by keyword or category.
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search query string
        - name: category
          in: query
          schema:
            type: string
          description: Filter by taxonomy field
      responses:
        "200":
          description: Matching modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleEntry"

  /modules/update:
    post:
      operationId: updateModule
      tags: [modules]
      summary: Update an installed module to a newer version
      description: Downloads and verifies the latest version, then replaces the installed module.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain_id]
              properties:
                domain_id:
                  type: string
                target_version:
                  type: string
                  description: Specific version to update to — latest if omitted
      responses:
        "200":
          description: Module updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleInstallResult"
        "400":
          description: Invalid request or downgrade attempted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Module not installed or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modules/check-updates:
    get:
      operationId: checkModuleUpdates
      tags: [modules]
      summary: Check for available updates to installed modules
      responses:
        "200":
          description: List of modules with available updates
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [domain_id, installed_version, latest_version]
                  properties:
                    domain_id:
                      type: string
                    installed_version:
                      type: string
                    latest_version:
                      type: string

  /modules/suggest:
    post:
      operationId: suggestModules
      tags: [modules]
      summary: Auto-detect compatible domain modules for a file
      description: |
        Analyzes a file path and returns matching domain modules based on
        format_signatures in module manifests. Does NOT install anything.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_path]
              properties:
                file_path:
                  type: string
                  description: Absolute local file path to analyze
      responses:
        "200":
          description: Suggested modules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestResponse"

  /modules/package:
    post:
      operationId: packageModule
      tags: [modules]
      summary: Package and sign a local domain module
      description: |
        Creates a distributable tarball from a local domain module directory,
        computes checksums, and signs the manifest. Publish is a portal operation — NOT daemon.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_path]
              properties:
                source_path:
                  type: string
                  description: Local directory path containing the domain module
                private_key_path:
                  type: string
                  description: Path to Ed25519 private key for signing
      responses:
        "200":
          description: Module packaged and signed
          content:
            application/json:
              schema:
                type: object
                required: [tarball_path, tarball_hash, manifest_path]
                properties:
                  tarball_path:
                    type: string
                  tarball_hash:
                    type: string
                  manifest_path:
                    type: string
                  signature:
                    type: string
        "400":
          description: Invalid module directory or missing manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /modules/revoke:
    post:
      operationId: revokeModule
      tags: [modules]
      summary: Revoke a module version
      description: |
        Marks a module version as revoked. Revoked modules cannot be installed
        or activated. Existing installations are deactivated on next daemon restart.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain_id, version, reason]
              properties:
                domain_id:
                  type: string
                version:
                  type: string
                reason:
                  type: string
                  description: Human-readable revocation reason
      responses:
        "200":
          description: Module revoked
          content:
            application/json:
              schema:
                type: object
                required: [success, domain_id, version]
                properties:
                  success:
                    type: boolean
                  domain_id:
                    type: string
                  version:
                    type: string
        "404":
          description: Module or version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Export endpoints (Phase3 W3 — Standards & Interoperability) ──────

  /export/rocrate/{run_id}:
    get:
      operationId: exportRoCrate
      tags: [export]
      summary: Export RO-Crate v2 metadata JSON
      description: |
        Returns an RO-Crate v2 metadata document (JSON-LD) for the given run.
        Maps SSV components to schema.org entities with W3C PROV annotations.
        Quantum provenance (shots, backend, circuit_depth) included when applicable.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: RO-Crate v2 metadata (JSON-LD)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoCrateMetadata"
        "404":
          description: Run or SSV not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /export/prov/{run_id}:
    get:
      operationId: exportProv
      tags: [export]
      summary: Export W3C PROV-JSON
      description: |
        Returns a W3C PROV-JSON document for the given run.
        PROV-DM model: Entity (data), Activity (run), Agent (researcher/module).
        Quantum runs typed as ss:QuantumComputeRun.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: W3C PROV-JSON document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvDocument"
        "404":
          description: Run or SSV not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /export/openlineage/{run_id}:
    get:
      operationId: exportOpenLineage
      tags: [export]
      summary: Export OpenLineage RunEvent
      description: Returns an OpenLineage RunEvent JSON document for the given run.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OpenLineage RunEvent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenLineageRunEvent"
        "404":
          description: Run or SSV not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /export/cwl/{run_id}:
    get:
      operationId: exportCwl
      tags: [export]
      summary: Export CWL Workflow YAML
      description: Returns a CWL v1.2 Workflow YAML document for the given run.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CWL Workflow YAML
          content:
            application/x-yaml:
              schema:
                type: string
        "404":
          description: Run or SSV not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /export/parquet/{run_id}:
    get:
      operationId: exportParquet
      tags: [export]
      summary: Export Parquet file
      description: Returns a Parquet file containing the run's result data.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Parquet file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Run or SSV not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: pyarrow not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /export/zarr/{run_id}:
    get:
      operationId: exportZarr
      tags: [export]
      summary: Export Zarr archive
      description: Returns a zipped Zarr archive containing the run's result data.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Zarr archive download (ZIP)
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "404":
          description: Run or SSV not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: zarr not installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Replication endpoints (Phase4 W1 — Institutional Replication) ──────

  /replication/request:
    post:
      operationId: createReplicationRequest
      tags: [replication]
      summary: Create a replication request for a claim
      description: |
        Creates a request for an independent institution to replicate a scientific claim.
        Main_Source §9A.5 M3-G: Quantum/hybrid claims require at least one confirmed
        institutional replication before endorsement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplicationRequest"
      responses:
        "200":
          description: Replication request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplicationRequestStatus"

  /replication/status/{request_id}:
    get:
      operationId: getReplicationStatus
      tags: [replication]
      summary: Get replication request status
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Replication request status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplicationRequestStatus"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /replication/submit-result:
    post:
      operationId: submitReplicationResult
      tags: [replication]
      summary: Submit a replication result with target SSV
      description: |
        Submits the result of an independent replication run. The daemon compares
        the target SSV against the source SSV and produces a comparison report.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_id, target_ssv_id]
              properties:
                request_id:
                  type: string
                target_ssv_id:
                  type: string
                target_ssv:
                  type: object
                  description: Optional SSV dict for comparison
      responses:
        "200":
          description: Replication result with comparison report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplicationResult"
        "404":
          description: Request or SSV not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /replication/history/{claim_id}:
    get:
      operationId: getReplicationHistory
      tags: [replication]
      summary: Get replication history for a claim
      parameters:
        - name: claim_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of replication requests for the claim
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReplicationRequestStatus"

  /replication/federation/push:
    post:
      operationId: federationPush
      summary: Push endorsed claim to trusted federation mirrors
      tags: [federation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [claim_id, institution_id]
              properties:
                claim_id: { type: string }
                institution_id: { type: string }
                domain_id: { type: string }
                title: { type: string }
                researcher_orcid: { type: string }
                gate_status: { type: object }
                ssv_hash: { type: string }
                ssv_signature: { type: string }
                endorsed_at: { type: string, format: date-time }
      responses:
        "200":
          description: Push queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [queued] }
                  claim_id: { type: string }
                  message: { type: string }
        "400":
          description: Missing required fields

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, version, uptime_seconds, active_runs, loaded_domains]
      properties:
        status:
          type: string
          enum: [healthy, degraded, starting]
        version:
          type: string
          description: Daemon version string (e.g. "0.1.0")
        uptime_seconds:
          type: number
        active_runs:
          type: integer
          description: Number of currently executing compute runs
        loaded_domains:
          type: array
          items:
            type: string
          description: domain_id list of registered domains

    DomainSummary:
      type: object
      description: |
        Shape matches Execution_Plan_Phase0.md §4.1 and DomainModule.describe() runtime output.
        Plain list — no wrapper. Fields: domain_id, domain_name, version, supported_data_types, method_count.
      required: [domain_id, domain_name, version, supported_data_types, method_count]
      properties:
        domain_id:
          type: string
        domain_name:
          type: string
        version:
          type: string
          pattern: '^\d+\.\d+\.\d+$'
          description: SemVer of the domain module
        supported_data_types:
          type: array
          items:
            type: string
          description: Data types this domain can process (e.g. ["mass_spec_gcms", "dsc_thermal"])
        method_count:
          type: integer

    DomainDetail:
      type: object
      required: [domain_id, domain_name, version, supported_data_types, methods]
      properties:
        domain_id:
          type: string
        domain_name:
          type: string
        version:
          type: string
        supported_data_types:
          type: array
          items:
            type: string
        methods:
          type: array
          items:
            type: object
            required: [method_id, name, produces_uncertainty, produces_validity_scope]
            properties:
              method_id:
                type: string
              name:
                type: string
              produces_uncertainty:
                type: boolean
              produces_validity_scope:
                type: boolean
              compute_class:
                type: string

    IngestRequest:
      type: object
      required: [data_path, acquisition_timestamp, instrument_id, domain_id, sample_id]
      properties:
        data_path:
          type: string
          description: Absolute local file path to raw data
        acquisition_timestamp:
          type: string
          format: date-time
        instrument_id:
          type: string
        domain_id:
          type: string
          description: Which domain this data belongs to
        sample_id:
          type: string
        signal_metadata:
          type: object
          description: Units, dynamic range, additional annotations

    IngestResponse:
      type: object
      required: [raw_data_id, content_hash, stored_at]
      properties:
        raw_data_id:
          type: string
          description: Permanent identifier — never reused, never deleted
        content_hash:
          type: string
          description: SHA-256 content hash for integrity verification
        stored_at:
          type: string
          format: date-time

    WorkspacesResponse:
      type: object
      required: [workspaces]
      properties:
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceSummary"

    WorkspaceSummary:
      type: object
      required: [workspace_id, name, created_at]
      properties:
        workspace_id:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time

    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    WorkspaceDetail:
      type: object
      required: [workspace_id, name, created_at, ssv_count, claim_count]
      properties:
        workspace_id:
          type: string
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        ssv_count:
          type: integer
        claim_count:
          type: integer

    ComputeRunRequest:
      type: object
      required: [workspace_id, domain_id, method_id]
      properties:
        workspace_id:
          type: string
          description: Target workspace identifier
        domain_id:
          type: string
          description: Domain module identifier (e.g. "polymer_science")
        method_id:
          type: string
          description: Method identifier within the domain (e.g. "kmd_analysis")
        dataset_ref:
          type: string
          description: raw_data_id from /datasets/ingest response
        assumptions:
          type: array
          items:
            type: object
          description: "P3: explicit scientific assumptions for this run"
        parameters:
          type: object
          description: Method-specific parameters
        compute_class:
          type: string
          enum: [classical, quantum_sim, quantum_hw, hybrid]
          description: "Optional compute class hint — defaults to classical if omitted"
      additionalProperties: false

    ComputeRunResult:
      type: object
      required: [run_id, workspace_id, domain_id, method_id, status, started_at]
      properties:
        run_id:
          type: string
        workspace_id:
          type: string
        domain_id:
          type: string
        method_id:
          type: string
        status:
          type: string
          enum: [pending, running, succeeded, failed]
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        ssv_ref:
          type: string
          description: SSV id — only when status=succeeded
        result:
          type: object
          description: Domain computation output — only when status=succeeded
        execution_witness:
          type: object
          required: [compute_class, backend_id]
          properties:
            compute_class:
              type: string
              enum: [classical, quantum_sim, quantum_hw, hybrid]
            backend_id:
              type: string
            quantum_metadata:
              type: object
              description: Present only for quantum/hybrid runs
              properties:
                shots:
                  type: integer
                noise_model:
                  type: string
                  nullable: true
                simulator:
                  type: string
                circuit_depth:
                  type: integer
                qubit_count:
                  type: integer
        exploratory:
          type: boolean
          description: "True for quantum_sim runs — cannot enter endorsable claim path (Main_Source §9A.3)"
        statevector:
          type: object
          nullable: true
          description: Statevector output (when requested) — null for shot-based runs
        error:
          type: object
          properties:
            error_code:
              type: string
            message:
              type: string
          description: Error detail — only when status=failed
      additionalProperties: false

    ModuleEntry:
      type: object
      required: [domain_id, version, install_path]
      properties:
        domain_id:
          type: string
        version:
          type: string
          pattern: '^\d+\.\d+\.\d+$'
        install_path:
          type: string
          description: Absolute path to the installed module directory

    ModuleInstallRequest:
      oneOf:
        - $ref: "#/components/schemas/ModuleInstallBundle"
        - $ref: "#/components/schemas/ModuleInstallRegistry"
      description: |
        Two install modes:
        - Bundle install: full manifest + package + public key (base64-encoded)
        - Registry install: module_id + version — daemon fetches from registry

    ModuleInstallBundle:
      type: object
      required: [manifest_b64, package_b64, public_key_b64]
      properties:
        manifest_b64:
          type: string
          description: Base64-encoded manifest JSON bytes
        package_b64:
          type: string
          description: Base64-encoded module package bytes
        public_key_b64:
          type: string
          description: Base64-encoded DER Ed25519 public key

    ModuleInstallRegistry:
      type: object
      required: [module_id, version]
      properties:
        module_id:
          type: string
          description: Domain module identifier (e.g. "polymer_science")
        version:
          type: string
          description: SemVer version to install from registry

    ModuleInstallResult:
      type: object
      required: [success, domain_id, version]
      properties:
        success:
          type: boolean
        domain_id:
          type: string
        version:
          type: string
        install_path:
          type: string

    ModuleRemoveResult:
      type: object
      required: [success, domain_id, data_preserved]
      properties:
        success:
          type: boolean
        domain_id:
          type: string
        data_preserved:
          type: boolean
          description: Always true — SSV/claim data is never deleted (P9)

    SuggestResponse:
      type: object
      required: [suggested_domains, confidence]
      properties:
        suggested_domains:
          type: array
          items:
            type: string
          description: Domain IDs matching the file extension
        confidence:
          type: string
          enum: [high, medium, low]
          description: "high=1 match, medium=>1 match, low=0 matches"

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        detail:
          type: object

    # ── Export schemas (Phase3 W3) ──────────────────────────────────────

    RoCrateMetadata:
      type: object
      required: ["@context", "@graph"]
      properties:
        "@context":
          type: string
          description: JSON-LD context (RO-Crate 1.2-DRAFT)
        "@graph":
          type: array
          items:
            type: object
          description: JSON-LD graph entities (Dataset, SoftwareApplication, CreateAction, PropertyValue)

    ProvDocument:
      type: object
      required: [prefix, entity, activity]
      properties:
        prefix:
          type: object
          description: PROV namespace prefixes
        entity:
          type: object
          description: PROV entities (data, result, SSV)
        activity:
          type: object
          description: PROV activities (compute runs)
        agent:
          type: object
          description: PROV agents (researcher, module)
        wasGeneratedBy:
          type: object
        used:
          type: object
        wasAttributedTo:
          type: object

    OpenLineageRunEvent:
      type: object
      required: [eventType, eventTime, producer, run, job]
      properties:
        eventType:
          type: string
          enum: [START, RUNNING, COMPLETE, FAIL, ABORT]
        eventTime:
          type: string
          format: date-time
        producer:
          type: string
        schemaURL:
          type: string
        run:
          type: object
          required: [runId]
          properties:
            runId:
              type: string
            facets:
              type: object
        job:
          type: object
          required: [namespace, name]
          properties:
            namespace:
              type: string
            name:
              type: string
            facets:
              type: object
        inputs:
          type: array
          items:
            type: object
        outputs:
          type: array
          items:
            type: object

    # ── Replication schemas (Phase4 W1) ──────────────────────────────

    ReplicationRequest:
      type: object
      required: [claim_id, source_institution_id, target_institution_id, method_id]
      properties:
        claim_id:
          type: string
        source_institution_id:
          type: string
        target_institution_id:
          type: string
        method_id:
          type: string
        dataset_ref:
          type: string
        compute_class:
          type: string
          enum: [classical, quantum_sim, quantum_hw, hybrid]
        tolerance:
          type: object
          properties:
            absolute:
              type: number
            relative:
              type: number

    ReplicationRequestStatus:
      type: object
      required: [request_id, claim_id, status]
      properties:
        request_id:
          type: string
        claim_id:
          type: string
        source_institution_id:
          type: string
        target_institution_id:
          type: string
        method_id:
          type: string
        status:
          type: string
          enum: [confirmed, partially_confirmed, not_confirmed, failed, pending]
        created_at:
          type: string
          format: date-time

    ReplicationResult:
      type: object
      required: [request_id, status, source_ssv_id, target_ssv_id]
      properties:
        request_id:
          type: string
        status:
          type: string
          enum: [confirmed, partially_confirmed, not_confirmed, failed, pending]
        source_ssv_id:
          type: string
        target_ssv_id:
          type: string
        comparison_report:
          type: object
          properties:
            result_match:
              type: boolean
            tolerance_used:
              type: object
            differences:
              type: array
              items:
                type: object
            confidence:
              type: number
              minimum: 0
              maximum: 1
        replicated_at:
          type: string
          format: date-time

    EndorsedClaimSync:
      type: object
      required: [claim_id, ssv_id, domain_id, title, researcher_orcid, gate_status, ssv_signature, ssv_hash]
      properties:
        claim_id:
          type: string
        ssv_id:
          type: string
        domain_id:
          type: string
        method_id:
          type: string
        title:
          type: string
        institution_id:
          type: string
        researcher_orcid:
          type: string
        gate_status:
          type: object
        ssv_signature:
          type: string
          description: Ed25519 signature — portal verifies
        ssv_hash:
          type: string
          description: SHA-256 integrity check
